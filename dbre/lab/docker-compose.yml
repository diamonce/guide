version: "3.8"

# Architecture:
#
#   App / scripts
#       │
#       ├── HAProxy :3306 ──► mysql-primary    (writes)
#       │           :3307 ──► mysql-replica1   (reads, round-robin)
#       │                └──► mysql-replica2
#       │
#       └── ProxySQL :6033 ──► auto read/write split
#                   :6032    admin UI
#
#   Monitoring stack:
#       mysqld-exporter-{primary,replica1,replica2} :9104-9106
#           │  scrape every 15s (global status, replica status, innodb metrics, processlist)
#           ▼
#       Prometheus :9090  ──► stores time-series
#           │
#           ▼
#       Grafana :3000
#           ├── Dashboard: MySQL Overview    (Prometheus — time-series)
#           └── Dashboard: MySQL Processlist (MySQL datasource — live SQL tables)
#               queries: SHOW PROCESSLIST, events_statements_summary_by_digest,
#                        innodb_trx, data_lock_waits
#
#   Percona Toolkit container has all pt-* tools + mysqldump

networks:
  db-net:
    driver: bridge

volumes:
  primary-data:
  replica1-data:
  replica2-data:
  backup-data:
  prometheus-data:
  grafana-data:

services:

  # ─────────────────────────────────────────
  # MySQL PRIMARY (master)
  # ─────────────────────────────────────────
  mysql-primary:
    image: mysql:8.0
    container_name: mysql-primary
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: shopdb
      MYSQL_USER: app
      MYSQL_PASSWORD: apppass
    ports:
      - "3310:3306"
    volumes:
      - primary-data:/var/lib/mysql
      - ./config/mysql-primary.cnf:/etc/mysql/conf.d/replication.cnf:ro
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./sql/create-repl-user.sql:/docker-entrypoint-initdb.d/02-repl.sql:ro
      - ./sql/create-monitoring-user.sql:/docker-entrypoint-initdb.d/03-monitoring.sql:ro
      - ./sql/04-auth-compat.sql:/docker-entrypoint-initdb.d/04-auth-compat.sql:ro
      - backup-data:/backup
    networks:
      db-net:
        aliases: [primary]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─────────────────────────────────────────
  # MySQL REPLICA 1
  # ─────────────────────────────────────────
  mysql-replica1:
    image: mysql:8.0
    container_name: mysql-replica1
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3311:3306"
    volumes:
      - replica1-data:/var/lib/mysql
      - ./config/mysql-replica1.cnf:/etc/mysql/conf.d/replication.cnf:ro
      - backup-data:/backup
    networks:
      db-net:
        aliases: [replica1]
    depends_on:
      mysql-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─────────────────────────────────────────
  # MySQL REPLICA 2
  # ─────────────────────────────────────────
  mysql-replica2:
    image: mysql:8.0
    container_name: mysql-replica2
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3312:3306"
    volumes:
      - replica2-data:/var/lib/mysql
      - ./config/mysql-replica2.cnf:/etc/mysql/conf.d/replication.cnf:ro
      - backup-data:/backup
    networks:
      db-net:
        aliases: [replica2]
    depends_on:
      mysql-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─────────────────────────────────────────
  # HAProxy — write port 3306, read port 3307
  # ─────────────────────────────────────────
  haproxy:
    image: haproxy:2.9-alpine
    container_name: haproxy
    restart: unless-stopped
    ports:
      - "3306:3306"   # writes → primary
      - "3307:3307"   # reads  → replicas
      - "8404:8404"   # stats UI
    volumes:
      - ./config/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - db-net
    depends_on:
      mysql-primary:
        condition: service_healthy

  # ─────────────────────────────────────────
  # ProxySQL — smart read/write split + pooling
  # ─────────────────────────────────────────
  proxysql:
    image: proxysql/proxysql:2.7.1
    container_name: proxysql
    restart: unless-stopped
    ports:
      - "6033:6033"   # MySQL protocol (app connects here)
      - "6032:6032"   # admin interface
      - "6080:6080"   # HTTP web UI (http://localhost:6080/)
    volumes:
      - ./config/proxysql.cnf:/etc/proxysql.cnf:ro
    networks:
      - db-net
    depends_on:
      mysql-primary:
        condition: service_healthy

  # ─────────────────────────────────────────
  # MySQL client tools (mysqlbinlog, etc.)
  # mysql:8.0.23 includes the full client suite
  # ─────────────────────────────────────────
  mysql-tools:
    image: mysql:8.0.23
    container_name: mysql-tools
    entrypoint: sleep infinity
    volumes:
      - backup-data:/backup
      - ./scripts:/scripts:ro
    networks:
      - db-net
    depends_on:
      mysql-primary:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Percona Toolkit + backup tools
  # ─────────────────────────────────────────
  toolkit:
    image: percona/percona-toolkit:3.5
    container_name: toolkit
    entrypoint: sleep infinity
    volumes:
      - backup-data:/backup
      - ./scripts:/scripts:ro
    networks:
      - db-net
    depends_on:
      mysql-primary:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Adminer — web UI (localhost:8080)
  # ─────────────────────────────────────────
  adminer:
    image: adminer:4
    container_name: adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - db-net

  # ─────────────────────────────────────────
  # mysqld_exporter — scrapes MySQL metrics
  # One per node: global_status, replica_status, innodb_metrics, processlist
  # ─────────────────────────────────────────
  mysqld-exporter-primary:
    image: prom/mysqld-exporter:v0.15.1
    container_name: mysqld-exporter-primary
    restart: unless-stopped
    environment:
      MYSQLD_EXPORTER_PASSWORD: "monitorpass"
    command:
      - --mysqld.address=mysql-primary:3306
      - --mysqld.username=monitoring
      - --collect.global_status
      - --collect.global_variables
      - --collect.info_schema.processlist
      - --collect.info_schema.innodb_metrics
      - --collect.binlog_size
      - --no-collect.info_schema.tables
      - --no-collect.slave_status        # primary has no replica status
    ports:
      - "9104:9104"
    networks:
      - db-net
    depends_on:
      mysql-primary:
        condition: service_healthy

  mysqld-exporter-replica1:
    image: prom/mysqld-exporter:v0.15.1
    container_name: mysqld-exporter-replica1
    restart: unless-stopped
    environment:
      MYSQLD_EXPORTER_PASSWORD: "monitorpass"
    command:
      - --mysqld.address=mysql-replica1:3306
      - --mysqld.username=monitoring
      - --collect.global_status
      - --collect.global_variables
      - --collect.slave_status            # replica lag, IO/SQL thread state
      - --collect.info_schema.innodb_metrics
      - --no-collect.info_schema.tables
    ports:
      - "9105:9104"
    networks:
      - db-net
    depends_on:
      mysql-replica1:
        condition: service_healthy

  mysqld-exporter-replica2:
    image: prom/mysqld-exporter:v0.15.1
    container_name: mysqld-exporter-replica2
    restart: unless-stopped
    environment:
      MYSQLD_EXPORTER_PASSWORD: "monitorpass"
    command:
      - --mysqld.address=mysql-replica2:3306
      - --mysqld.username=monitoring
      - --collect.global_status
      - --collect.global_variables
      - --collect.slave_status
      - --collect.info_schema.innodb_metrics
      - --no-collect.info_schema.tables
    ports:
      - "9106:9104"
    networks:
      - db-net
    depends_on:
      mysql-replica2:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Prometheus — time-series storage
  # UI: localhost:9090
  # ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
    networks:
      - db-net
    depends_on:
      - mysqld-exporter-primary

  # ─────────────────────────────────────────
  # Grafana — dashboards
  # UI: localhost:3000  admin / admin
  # Dashboards auto-provisioned from config/grafana/
  # ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - db-net
    depends_on:
      - prometheus
