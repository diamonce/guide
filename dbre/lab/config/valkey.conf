# Valkey primary configuration
# Role: caching tier (cache-first, eviction enabled)

bind 0.0.0.0
protected-mode no
port 6379

# ─── Persistence ────────────────────────────────────────
# RDB snapshot: save if N keys changed in M seconds
save 900 1
save 300 10
save 60  10000
dbfilename dump.rdb
dir /data

# AOF disabled for cache-only use — enable for durable writes
appendonly no

# ─── Memory / eviction ──────────────────────────────────
# Cap memory so Valkey behaves as a bounded cache, not unbounded KV store.
# allkeys-lru: evict least-recently-used keys when maxmemory is reached.
# This is the correct policy for a cache (not a primary store).
maxmemory 256mb
maxmemory-policy allkeys-lru

# ─── Replication ────────────────────────────────────────
# Replicas connect to this primary; no config needed here.
# On replica side: replicaof valkey 6379

# ─── Slow log ───────────────────────────────────────────
# Log commands that take longer than 10ms — visible via SLOWLOG GET
slowlog-log-slower-than 10000
slowlog-max-len 128

# ─── Keyspace notifications ─────────────────────────────
# Enable expired-key events so consumers can react to TTL expiry.
# K = keyspace events, E = keyevent events, x = expired
notify-keyspace-events "KEx"

# ─── Latency monitoring ─────────────────────────────────
latency-monitor-threshold 100
