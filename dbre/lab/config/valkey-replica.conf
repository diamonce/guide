# Valkey replica configuration
# Role: read-only replica of valkey primary

bind 0.0.0.0
protected-mode no
port 6379

# ─── Replication ────────────────────────────────────────
replicaof valkey 6379

# Replica serves stale data while re-syncing — acceptable for cache
replica-serve-stale-data yes

# Replica is read-only
replica-read-only yes

# ─── Persistence (none on replica — primary is authoritative) ──
save ""
appendonly no

dir /data

# ─── Memory / eviction (match primary policy) ───────────
maxmemory 256mb
maxmemory-policy allkeys-lru

slowlog-log-slower-than 10000
slowlog-max-len 128
