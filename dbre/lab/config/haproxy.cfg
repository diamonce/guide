global
    log stdout format raw local0 info
    maxconn 4096

defaults
    log     global
    mode    tcp
    option  tcplog
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    retries 3

# ─────────────────────────────────────────
# WRITES — port 3306 → primary only
# ─────────────────────────────────────────
frontend mysql-write
    bind *:3306
    default_backend mysql-primary

backend mysql-primary
    option  mysql-check user haproxy_check post-41
    server  primary mysql-primary:3306 check inter 2s rise 2 fall 3

# ─────────────────────────────────────────
# READS — port 3307 → replicas, round-robin
# ─────────────────────────────────────────
frontend mysql-read
    bind *:3307
    default_backend mysql-replicas

backend mysql-replicas
    balance roundrobin
    option  mysql-check user haproxy_check post-41
    server  replica1 mysql-replica1:3306 check inter 2s rise 2 fall 3
    server  replica2 mysql-replica2:3306 check inter 2s rise 2 fall 3

# ─────────────────────────────────────────
# Stats page — http://localhost:8404/stats
# ─────────────────────────────────────────
frontend stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 5s
    stats show-legends
    stats show-node
