global
    log stdout format raw local0 info
    maxconn 4096

defaults
    log     global
    mode    tcp
    option  tcplog
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    retries 3

# ─────────────────────────────────────────
# WRITES — port 3306 → primary only
# ─────────────────────────────────────────
frontend mysql-write
    bind *:3306
    default_backend mysql-primary

backend mysql-primary
    option  mysql-check user haproxy_check post-41
    server  primary mysql-primary:3306 check inter 2s rise 2 fall 3

# ─────────────────────────────────────────
# READS — port 3307 → replicas, round-robin
# ─────────────────────────────────────────
frontend mysql-read
    bind *:3307
    default_backend mysql-replicas

backend mysql-replicas
    balance roundrobin
    option  mysql-check user haproxy_check post-41
    server  replica1 mysql-replica1:3306 check inter 2s rise 2 fall 3
    server  replica2 mysql-replica2:3306 check inter 2s rise 2 fall 3

# ─────────────────────────────────────────
# PROXYSQL — port 6033 → cluster (leastconn)
#
# App connects here — never directly to proxysql:6033.
# leastconn distributes long-lived MySQL connections evenly.
# HAProxy detects a crashed ProxySQL within ~6s (fall 3 × inter 2s)
# and stops routing to it. The surviving node serves all traffic.
# ─────────────────────────────────────────
frontend proxysql-frontend
    bind *:6033
    default_backend proxysql-nodes

backend proxysql-nodes
    balance leastconn
    option tcp-check
    server proxysql1 proxysql:6033  check inter 2s rise 2 fall 3
    server proxysql2 proxysql2:6033 check inter 2s rise 2 fall 3

# ─────────────────────────────────────────
# VALKEY WRITES — port 6379 → primary
# App always connects to HAProxy:6379 — never directly to Valkey.
# If primary moves, only HAProxy config changes; app endpoint stays the same.
# ─────────────────────────────────────────
frontend valkey-write
    bind *:6379
    default_backend valkey-primary

backend valkey-primary
    option tcp-check
    tcp-check connect
    tcp-check send PING\r\n
    tcp-check expect string +PONG
    server valkey1 valkey:6379 check inter 2s rise 2 fall 3

# ─────────────────────────────────────────
# VALKEY READS — port 6380 → replica
# Offload read-heavy cache lookups to the replica.
# ─────────────────────────────────────────
frontend valkey-read
    bind *:6380
    default_backend valkey-replicas

backend valkey-replicas
    balance roundrobin
    option tcp-check
    tcp-check connect
    tcp-check send PING\r\n
    tcp-check expect string +PONG
    server valkey-replica1 valkey-replica:6379 check inter 2s rise 2 fall 3

# ─────────────────────────────────────────
# Stats page — http://localhost:8404/stats
# ─────────────────────────────────────────
frontend stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 5s
    stats show-legends
    stats show-node
